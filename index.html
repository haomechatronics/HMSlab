<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMSlab | Creative Garage & Development Space</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brandOrange: '#ea580c', brandDark: '#18181b', brandLight: '#fafafa' },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
                }
            }
        }
    </script>
</head>
<body class="bg-brandLight text-zinc-800 font-sans antialiased">

    <header class="w-full fixed top-0 backdrop-blur-md bg-brandLight/80 border-b border-zinc-200 z-50">
        <div class="container mx-auto px-6 h-20 flex items-center justify-between">
            
            <a href="#" class="flex items-center gap-3">
                <span class="text-xl font-bold text-brandDark">HMS<span class="text-brandOrange">lab</span>.</span>
            </a>

            <nav class="hidden md:flex space-x-8 items-center">
                <a href="#projects" class="text-sm font-medium hover:text-brandOrange" data-vn="Dự án" data-en="Projects">Dự án</a>
                <a href="#lab-notes" class="text-sm font-medium hover:text-brandOrange" data-vn="Bài viết" data-en="Lab Notes">Bài viết</a>
                <a href="#tools" class="text-sm font-medium hover:text-brandOrange" data-vn="Công cụ" data-en="Gear & Tools">Công cụ</a>
            </nav>

            <div class="hidden md:flex items-center space-x-6">
                <button id="lang-toggle" class="flex items-center gap-1.5 text-sm font-bold text-zinc-600 bg-zinc-200 hover:bg-orange-100 px-4 py-2 rounded-md transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"></path></svg>
                    <span id="lang-text">Tiếng Việt</span>
                </button>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-12">
        <section class="container mx-auto px-6 flex flex-col items-center text-center">
            <h1 class="text-4xl md:text-6xl font-bold text-brandDark mb-6 max-w-4xl">
                <span data-vn="Khám phá. Chế tạo." data-en="Explore. Build.">Khám phá. Chế tạo.</span><br>
                <span class="text-brandOrange" data-vn="Chia sẻ kiến thức." data-en="Share Knowledge.">Chia sẻ kiến thức.</span>
            </h1>
            <p class="text-lg text-zinc-500 mb-10 max-w-2xl" data-vn="Không gian tôi ghi lại quá trình tạo ra các dự án." data-en="The space where I document the process of building projects.">
                Không gian tôi ghi lại quá trình tạo ra các dự án.
            </p>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Lấy nút bấm và thẻ chứa chữ ngôn ngữ
            const toggleBtn = document.getElementById('lang-toggle');
            const langText = document.getElementById('lang-text');
            
            // Đặt ngôn ngữ mặc định
            let currentLang = 'vn'; 

            if (toggleBtn) {
                toggleBtn.addEventListener('click', function() {
                    // 1. Đảo trạng thái: Nếu đang vn thì thành en, ngược lại.
                    currentLang = (currentLang === 'vn') ? 'en' : 'vn';
                    
                    // 2. Đổi chữ ngay trên nút bấm
                    langText.innerText = (currentLang === 'vn') ? 'Tiếng Việt' : 'English';
                    
                    // 3. Quét toàn bộ HTML tìm thẻ có data-vn và data-en để thay đổi chữ
                    const elements = document.querySelectorAll('[data-vn][data-en]');
                    elements.forEach(function(el) {
                        el.innerHTML = el.getAttribute('data-' + currentLang);
                    });
                });
            }
        });
    </script>
</body>
</html>
