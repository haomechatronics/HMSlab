<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMSLab - Chào mừng bạn</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; text-align: center; }
        .container { background: white; padding: 50px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #007bff; }
        h1 { color: #333; margin-bottom: 10px; }
        p { color: #666; font-size: 1.1em; }
        .domain { color: #007bff; font-weight: bold; }
        .btn { display: inline-block; margin-top: 20px; padding: 10px 25px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; transition: 0.3s; }
        .btn:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 HMSLab.store đang khởi tạo</h1>
        <p>Website đang được triển khai chuyên nghiệp trên nền tảng <span class="domain">Netlify & GitHub</span>.</p>
        <p id="time"></p>
        <a href="#" class="btn">Liên hệ với chúng tôi</a>
    </div>

    <script>
        // Đoạn code JS nhỏ để hiển thị thời gian thực cho chuyên nghiệp
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = "Cập nhật lần cuối: " + now.toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
