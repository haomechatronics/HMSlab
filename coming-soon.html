<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-vn="Tính năng sắp ra mắt | HMSlab" data-en="Coming Soon | HMSlab">Tính năng sắp ra mắt | HMSlab</title>
    
    <link rel="icon" type="image/png" href="./assets/images/logonho.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { brandOrange: '#ea580c', brandDark: '#111111', brandLight: '#fcfcfc' }, fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['Fira Code', 'monospace'] } } } }
    </script>
    <link rel="stylesheet" href="./assets/css/studio-effects.css">
</head>
<body class="min-h-screen bg-brandLight text-zinc-800 font-sans antialiased selection:bg-brandOrange selection:text-white">
    <main class="min-h-screen px-6 py-12 flex items-center justify-center">
        <section class="w-full max-w-2xl text-center">
            <div class="mb-10 flex flex-wrap items-center justify-center gap-3">
                <a href="/home" class="inline-flex h-10 items-center justify-center gap-2">
                    <img src="/assets/images/logonho.png" onerror="this.onerror=null;this.src='./assets/images/logonho.png';" alt="HMSlab Logo" class="h-8 w-auto">
                    <span class="text-2xl font-extrabold leading-none tracking-tighter text-brandDark">HMS<span class="text-brandOrange">lab</span>.</span>
                </a>
                <div class="inline-flex h-10 items-center px-4 rounded-full bg-white border border-zinc-200 text-zinc-600 text-xs font-mono font-medium tracking-widest uppercase shadow-sm" data-vn="Sắp ra mắt" data-en="Coming Soon">
                    Coming Soon
                </div>
            </div>
            <h1 class="text-4xl md:text-6xl font-extrabold text-brandDark tracking-tight mb-6" data-vn="Tính năng sắp ra mắt" data-en="Coming Soon">
                Tính năng sắp ra mắt
            </h1>
            <p class="text-lg md:text-xl text-zinc-500 leading-relaxed mb-10" data-vn="Phần này đang được HMSlab hoàn thiện. Quay lại sau một chút nhé, mình đang cố gắng hoàn thiện cảm ơn bạn đã ghé qua!" data-en="This feature is being polished by HMSlab. Please check back soon, we are making it cleaner and more useful. Thanks for stopping by!">
                Phần này đang được HMSlab hoàn thiện. Quay lại sau một chút nhé, mình đang cố gắng hoàn thiện cảm ơn bạn đã ghé qua!
            </p>
            <a href="/home" class="inline-flex items-center justify-center bg-brandDark text-white px-8 py-4 rounded-full font-bold hover:bg-brandOrange transition-colors shadow-lg" data-vn="Về trang chủ" data-en="Back Home">
                Về trang chủ
            </a>
        </section>
    </main>

    <script>
        const currentLang = localStorage.getItem('hms_lang') || 'vn';
        document.documentElement.lang = currentLang === 'en' ? 'en' : 'vi';
        document.querySelectorAll('[data-vn][data-en]').forEach(el => {
            const value = el.getAttribute(`data-${currentLang}`);
            if (el.tagName === 'TITLE') {
                document.title = value;
            } else {
                el.textContent = value;
            }
        });

        if (window.location.protocol !== 'file:' && window.location.pathname === '/coming-soon.html') {
            window.history.replaceState({}, '', `${window.location.origin}/coming-soon`);
        }
    </script>
    <script src="./assets/js/studio-effects.js"></script>
</body>
</html>
